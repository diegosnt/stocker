<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <clipPath id="card">
      <rect width="40" height="40" rx="9"/>
    </clipPath>
  </defs>

  <!-- Fondo blanco redondeado -->
  <rect width="40" height="40" rx="9" fill="white"/>

  <!-- Cuadrícula recortada al borde redondeado -->
  <g clip-path="url(#card)" stroke="#dadce0" stroke-width="0.8">
    <line x1="0" y1="10" x2="40" y2="10"/>
    <line x1="0" y1="20" x2="40" y2="20"/>
    <line x1="0" y1="30" x2="40" y2="30"/>
    <line x1="10" y1="0" x2="10" y2="40"/>
    <line x1="20" y1="0" x2="20" y2="40"/>
    <line x1="30" y1="0" x2="30" y2="40"/>
  </g>

  <!-- Área rellena bajo la tendencia -->
  <path d="M5,30 L12,23 L19,27 L27,16 L35,9 L35,35 L5,35 Z"
    fill="#188038" fill-opacity="0.13" clip-path="url(#card)"/>

  <!-- Línea de tendencia verde -->
  <polyline
    points="5,30 12,23 19,27 27,16 35,9"
    stroke="#188038" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Punta de flecha verde -->
  <polyline
    points="28,8 35,9 34,16"
    stroke="#188038" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
